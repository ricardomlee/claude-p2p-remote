<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude P2P Remote</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1a1a2e;
        color: #eee;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .header {
        padding: 16px;
        background: #16213e;
        border-bottom: 1px solid #0f3460;
      }
      .header h1 {
        font-size: 18px;
        font-weight: 600;
      }
      .chat-container {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
      }
      .message {
        margin-bottom: 16px;
        padding: 12px 16px;
        border-radius: 12px;
        max-width: 80%;
      }
      .message.user {
        background: #0f3460;
        margin-left: auto;
      }
      .message.claude {
        background: #16213e;
      }
      .input-container {
        padding: 16px;
        background: #16213e;
        border-top: 1px solid #0f3460;
      }
      .input-row {
        display: flex;
        gap: 8px;
      }
      #messageInput {
        flex: 1;
        padding: 12px 16px;
        border: none;
        border-radius: 24px;
        background: #0f3460;
        color: #eee;
        font-size: 14px;
        outline: none;
      }
      #messageInput::placeholder {
        color: #888;
      }
      #sendBtn {
        padding: 12px 24px;
        border: none;
        border-radius: 24px;
        background: #e94560;
        color: white;
        font-size: 14px;
        cursor: pointer;
      }
      #sendBtn:hover {
        background: #ff6b6b;
      }
      .status-bar {
        padding: 8px 16px;
        background: #0f3460;
        font-size: 12px;
        color: #888;
      }
      .status-bar.connected {
        color: #4ade80;
      }
      .pairing-section {
        padding: 24px 16px;
        text-align: center;
      }
      .pairing-code {
        font-size: 36px;
        font-family: monospace;
        letter-spacing: 8px;
        margin: 24px 0;
        color: #e94560;
      }
      #pairingSection {
        display: none;
      }
      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        background: #e94560;
        color: white;
        font-size: 14px;
        cursor: pointer;
        margin: 8px;
      }
      .input-field {
        padding: 12px 16px;
        border: 1px solid #0f3460;
        border-radius: 8px;
        background: #0f3460;
        color: #eee;
        font-size: 24px;
        text-align: center;
        letter-spacing: 8px;
        width: 200px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Claude P2P Remote</h1>
    </div>

    <div class="status-bar" id="statusBar">Disconnected</div>

    <!-- Pairing Section -->
    <div id="pairingSection">
      <div class="pairing-section">
        <h2>Connect to Daemon</h2>
        <p style="color: #888; margin-top: 8px;">Enter the 6-digit pairing code from your daemon</p>
        <input type="text" id="pairingCode" class="input-field" maxlength="6" placeholder="000000" />
        <br />
        <button class="btn" id="connectBtn">Connect</button>
      </div>
    </div>

    <!-- Chat Section -->
    <div id="chatSection" style="display: none; flex: 1; display: flex; flex-direction: column;">
      <div class="chat-container" id="chatContainer">
        <div class="message claude">
          Welcome! Connect to a daemon to start chatting.
        </div>
      </div>

      <div class="input-container">
        <div class="input-row">
          <input type="text" id="messageInput" placeholder="Type a message..." />
          <button id="sendBtn">Send</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
